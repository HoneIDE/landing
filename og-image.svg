<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="60%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <linearGradient id="edge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00FFD0"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0077B6" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb-grad" cx="75%" cy="30%" r="55%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
    <filter id="mark-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0D1117"/>

  <!-- Subtle radial glow top-right -->
  <ellipse cx="960" cy="180" rx="520" ry="340" fill="url(#orb-grad)"/>

  <!-- Bottom-left corner gradient accent -->
  <rect x="0" y="400" width="400" height="230" fill="url(#glow-grad)" opacity="0.5"/>

  <!-- Border frame -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#30363D" stroke-width="1.5"/>

  <!-- Brand mark (diamond) — centered vertically, left-aligned block -->
  <g transform="translate(96, 210) scale(3.6)">
    <polygon points="24,0 0,28 24,56" fill="#0077B6" opacity="0.65"/>
    <polygon points="24,0 48,28 24,56" fill="url(#brand-grad)"/>
    <line x1="24" y1="0" x2="24" y2="56" stroke="url(#edge-grad)" stroke-width="1.5" filter="url(#mark-glow)" opacity="0.9"/>
    <circle cx="24" cy="0" r="2.5" fill="#00FFD0" opacity="0.9"/>
  </g>

  <!-- Wordmark: HONE -->
  <text x="310" y="344"
        font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="112" font-weight="600" fill="#E6EDF3" letter-spacing="14">HONE</text>

  <!-- Subtitle -->
  <text x="314" y="392"
        font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace"
        font-size="18" font-weight="400" fill="#00D4AA" letter-spacing="7" opacity="0.85">NATIVE CODE EDITOR</text>

  <!-- Tagline -->
  <text x="314" y="456"
        font-family="'SF Pro Display', 'Segoe UI', 'Helvetica Neue', sans-serif"
        font-size="26" font-weight="400" fill="#8B949E" letter-spacing="0">Sharpen your code, natively.</text>

  <!-- Bottom domain -->
  <text x="96" y="568"
        font-family="'JetBrains Mono', 'SF Mono', monospace"
        font-size="16" font-weight="400" fill="#484F58" letter-spacing="2">hone.codes</text>

  <!-- Top-right Perry credit (small) -->
  <text x="1104" y="568"
        font-family="'SF Pro Display', 'Segoe UI', sans-serif"
        font-size="14" font-weight="400" fill="#484F58" text-anchor="end">Powered by Perry</text>
</svg>
